openapi: 3.0.0

servers:
  - url: ./

info:
  title: opensvc collector api
  version: 1.0.3

paths:
  /apps:
    get:
      operationId: GetApps
      description: List available apps
      parameters:
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /auth/node:
    post:
      description: |
        Register a node authentication
      operationId: PostAuthNode
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              required:
                - nodename
              properties:
                nodename:
                  type: string
                app:
                  type: string
      responses:
        200:
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                required:
                  - uuid
                  - info
                properties:
                  uuid:
                    type: string
                  info:
                    type: string
        403:
          $ref: '#/components/responses/403'
        409:
          $ref: '#/components/responses/409'
        500:
          $ref: '#/components/responses/500'
      security:
        - { }
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - auth

  /openapi.json:
    get:
      operationId: GetSwagger
      tags:
        - public
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        401:
          $ref: '#/components/responses/401'
        403:
          $ref: '#/components/responses/403'
        500:
          $ref: '#/components/responses/500'

  /nodes/{node_id}/compliance/candidate_modulesets:
    get:
      description: |
        Get candidate modulesets for a node
      operationId: GetNodeComplianceCandidateModulesets
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
      responses:
        200:
          description: List of candidate modulesets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          description: Node not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/candidate_rulesets:
    get:
      description: |
        Get candidate rulesets for a node
      operationId: GetNodeComplianceCandidateRulesets
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
      responses:
        200:
          description: List of candidate rulesets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          description: Node not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/logs:
    get:
      description: |
        Get compliance logs for a node
      operationId: GetNodeComplianceLogs
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inQueryProps'
      responses:
        200:
          description: Compliance logs for the node
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        404:
          description: Node not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/modulesets:
    get:
      description: |
        Get modulesets attached to a node
      operationId: GetNodeComplianceModulesets
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
      responses:
        200:
          description: List of attached modulesets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          description: Node not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/modulesets/{mset_id}:
    delete:
      description: |
        Detach a moduleset from a node
      operationId: DeleteNodeComplianceModuleset
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inPathMsetId'
      responses:
        204:
          description: Moduleset successfully detached
        404:
          description: Node or moduleset not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector
    post:
      description: |
        Attach a moduleset to a node
      operationId: PostNodeComplianceModuleset
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inPathMsetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        202:
          description: Moduleset attached
        400:
          $ref: '#/components/responses/400'
        401:
          $ref: '#/components/responses/401'
        403:
          $ref: '#/components/responses/403'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/rulesets:
    get:
      description: |
        Get rulesets attached to a node
      operationId: GetNodeComplianceRulesets
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
      responses:
        200:
          description: List of attached rulesets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          description: Node not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/rulesets/{rset_id}:
    delete:
      description: |
        Detach a ruleset from a node
      operationId: DeleteNodeComplianceRuleset
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inPathRsetId'
      responses:
        204:
          description: Ruleset successfully detached
        404:
          description: Node or ruleset not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector
    post:
      description: |
        Attach a ruleset to a node
      operationId: PostNodeComplianceRuleset
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inPathRsetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        202:
          description: Ruleset attached
        400:
          $ref: '#/components/responses/400'
        401:
          $ref: '#/components/responses/401'
        403:
          $ref: '#/components/responses/403'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /tags:
    get:
      operationId: GetTags
      description: List existing tags
      parameters:
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /tags/{tag_id}:
    get:
      operationId: GetTag
      description: Display tag property
      parameters:
        - in: path
          name: tag_id
          required: true
          description: ID of the tag
          schema:
            type: integer
        - $ref: '#/components/parameters/inQueryProps'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /tags/{tag_id}/nodes:
    get:
      operationId: GetTagNodes
      description: Get nodes where the tag is attached
      parameters:
        - in: path
          name: tag_id
          required: true
          description: ID of the tag
          schema:
            type: integer
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
      tags:
        - collector
      responses:
        200:
          description: List of nodes with this tag
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        404:
          description: Tag not found
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /version:
    get:
      operationId: GetVersion
      description: return api version
      tags:
        - capabilities
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/version'
        500:
          $ref: '#/components/responses/500'

components:

  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '204':
      description: No Content
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '404':
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '408':
      description: Request Timeout
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '409':
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '503':
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    Problem:
      type: object
      properties:
        text:
          description: |
            A human-readable explanation specific to this occurrence of the
            problem.
          type: string
      required:
        - text

    version:
      type: object
      required:
        - version
      properties:
        version:
          type: string
          example: "0.0.1"

    ListMeta:
      type: object
      required:
      properties:
        count:
          type: integer
        available_props:
          type: array
          items:
            type: string
        included_props:
          type: array
          items:
            type: string
        limit:
          type: integer
        offset:
          type: integer
        distinct:
          type: object
          additionalProperties:
            type: integer
        total:
          type: integer

    ListResponse:
      type: object
      required:
        - data
      properties:
        data:
          oneOf:
            - type: array
              items:
                type: object
            - type: object
              additionalProperties:
                type: object
                additionalProperties:
                  type: integer
        meta:
          $ref: '#/components/schemas/ListMeta'

  parameters:
    inPathMsetId:
      in: path
      name: mset_id
      required: true
      description: ID of the moduleset
      schema:
        type: string

    inPathNodeId:
      in: path
      name: node_id
      required: true
      description: ID of the node
      schema:
        type: string

    inPathRsetId:
      in: path
      name: rset_id
      required: true
      description: ID of the ruleset
      schema:
        type: string

    inQueryLimit:
      in: query
      name: limit
      required: false
      description: The maximum number of entries to return. 0 means no limit.
      schema:
        type: integer
        minimum: 0
        default: 50

    inQueryOffset:
      in: query
      name: offset
      required: false
      description: Skip the first entries of the data cursor.
      schema:
        type: integer
        minimum: 0
        default: 0

    inQueryProps:
      in: query
      name: props
      required: false
      description: A list of properties to include in each data dictionnary.
      schema:
        type: string

    inQueryMeta:
      in: query
      name: meta
      required: false
      description: Include metadata in the response. Enabled by default. Use false or 0 to omit the meta field.
      schema:
        type: string

    inQueryStats:
      in: query
      name: stats
      required: false
      description: Controls the inclusion in the returned dictionnary of a "stats" key, containing the selected properties distinct values counts.
      schema:
        type: string

    inQuerySync:
      in: query
      name: sync
      schema:
        type: boolean

    ObjectPathHeader:
      name: OC3-ObjectPath
      in: header
      schema:
        type: string

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
